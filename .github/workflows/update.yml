name: Update Scoop Radar README
run-name: Update Scoop Radar README (${{ github.event_name }}) by @${{ github.actor }}

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  PYTHONUNBUFFERED: "1"

on:
  schedule:
    - cron: '23 * * * *' # Run hourly at 23 past the hour to avoid GitHub Actions peak load
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'maintenance/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Cache crawler data
        uses: actions/cache@v5
        with:
          path: |
            scoop_shovel/cache
            scoop_shovel/cache.pickle
            chocolatey/cache
            chocolatey/cache.pickle
          key: ${{ runner.os }}-crawler-v2-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-crawler-v2-cache-
            ${{ runner.os }}-crawler-cache-

      - name: Migrate old cache layout
        run: |
          if [ -d "maintenance/cache" ]; then
            echo "Migrating maintenance/cache to scoop_shovel/cache..."
            mkdir -p scoop_shovel
            mv maintenance/cache scoop_shovel/
            mv maintenance/cache.pickle scoop_shovel/ || true
          fi

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run scoop-radar-updater

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "Automated README update [ci skip]"

      - name: Upload cache artifact
        uses: actions/upload-artifact@v7
        with:
          name: crawler-cache
          path: |
            scoop_shovel/cache.pickle
            chocolatey/cache.pickle
          retention-days: 7
