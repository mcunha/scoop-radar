name: Update Scoop Radar README
run-name: Update Scoop Radar README (${{ github.event_name }}) by @${{ github.actor }}

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  schedule:
    - cron: '23 * * * *' # Run hourly at 23 past the hour to avoid GitHub Actions peak load
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'maintenance/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Cache crawler data
        uses: actions/cache@v5
        with:
          path: |
            maintenance/cache
            maintenance/cache.pickle
          key: ${{ runner.os }}-crawler-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-crawler-cache-

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run scoop-radar-updater

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "Automated README update [ci skip]"

      - name: Upload cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: crawler-cache
          path: maintenance/cache.pickle
          retention-days: 7
